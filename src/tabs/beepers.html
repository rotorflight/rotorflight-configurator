<div class="tab-beepers toolbar_fixed_bottom">
    <div class="content_wrapper">
        <div class="tab_title" i18n="tabBeepers"></div>
        <div class="cf_doc_version_bt">
            <a id="button-documentation" href="https://github.com/rotorflight/rotorflight/releases" target="_blank" rel="noopener noreferrer"></a>
        </div>

        <div class="grid-row">
            <div class="grid-col col12">
                <!-- DSHOT BEEPER -->
                <div class="dshotBeeper" style="width: calc(100%);">
                    <div class="gui_box grey" style="margin-top:10px;">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="configurationDshotBeeper"></div>
                            <div class="helpicon cf_tip" i18n_title="configurationDshotBeaconHelp"></div>
                        </div>
                        <div class="spacer_box">
                            <table cellpadding="0" cellspacing="0">
                                <tbody class="dshot-beeper-configuration" id="noline">
                                <tr class="dshotbeacon">
                                    <td>
                                        <div class="select">
                                            <select class="dshotBeeperBeaconTone">
                                                <option value="0" hidden></option>
                                                <!-- list generated here -->
                                            </select>
                                            <span i18n="configurationDshotBeaconTone"></span>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                            <table cellpadding="0" cellspacing="0">
                                <tbody class="dshotBeaconConditions" id="noline">
                                <!-- table generated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-row beepers">
            <div class="grid-col col12">
                <!-- BEEPER -->
                <div class="beepers" style="width: calc(100%);">
                    <div class="gui_box grey" style="margin-top:10px;">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="configurationBeeper"></div>
                        </div>
                        <div class="spacer_box">
                            <table cellpadding="0" cellspacing="0">
                                <tbody class="beeper-configuration" id="noline">
                                <tr class="beeper-template" style="display:none">
                                    <td>
                                        <input class="condition toggle" id="" name="" title="" type="checkbox" />
                                    </td>
                                    <td>
                                        <div></div>
                                        <span class="xs"></span>
                                    </td>
                                    <td>
                                        <span class="sm-min"></span>
                                    </td>
                                </tr>
                                <!-- table generated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content_toolbar">
            <div class="btn save_btn">
                <a class="save" href="#" i18n="beepersButtonSave"></a>
            </div>
        </div>
    </div>
</div>
